<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" type="text/css" href="tictactoe.css">
    <style>
        /* Vertical lines */
        .vl,
        .vl2,
        .vl3 {
            border-width: 1px;
            height: 100px;
            position: absolute;
        }



        /* Horizontal lines */
        .line,
        .line2,
        .line3 {
            border-right: 6px solid black;
            border-width: 1px;
            height: 100px;
            position: absolute;
        }

        /* Horizontal bottom borders */
        .v1,
        .v2,
        .v3,
        .v4,
        .v5,
        .v6 {
            border-bottom: 6px solid black;
            border-width: 1px;
            width: 100px;
            position: absolute;
        }
    </style>
</head>

<body>
    <h1>Tic Tac Toe</h1>

    <!-- Vertical divs -->
    <div class="vl"></div>
    <div class="vl2"></div>
    <div class="vl3"></div>

    <!-- Right-aligned divs -->
    <div class="line"></div>
    <div class="line2"></div>
    <div class="line3"></div>

    <!-- Bottom border divs -->
    <div class="v1"></div>
    <div class="v2"></div>
    <div class="v3"></div>
    <div class="v4"></div>
    <div class="v5"></div>
    <div class="v6"></div>

</body>

</html>
